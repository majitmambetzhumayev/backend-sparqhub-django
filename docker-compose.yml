services:
  django:
    build: .
    command: uvicorn backend_sparqhub_django.asgi:application --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:latest
    container_name: my-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Zenith100+
      - POSTGRES_DB=mydb
    volumes:
      - ~/docker/pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"

  celery:
    build: .
    command: celery -A backend_sparqhub_django worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - django
      - redis
