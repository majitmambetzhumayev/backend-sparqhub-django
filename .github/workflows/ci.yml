name: Backend CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-only-secret-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_HOST: localhost
      DATABASE_NAME: mydb
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_PORT: 5432
      REDIS_URL: redis://localhost:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      BACKEND_URL: http://localhost:8000
      # Valid Fernet-format key, generated for CI only — never used outside
      # this ephemeral test run, not a real secret.
      FIELD_ENCRYPTION_KEY: 5SSo0na4r6mDByBidbXkzkHvYtfud6xAep5dUKtEQcc=
      # Left blank: every test mocks the external SDK call sites directly
      # (per CLAUDE.md's provider-testing rule), so no real provider keys
      # are needed for the suite to pass.
      ANTHROPIC_API_KEY: ""
      OPENAI_API_KEY: ""
      MISTRAL_API_KEY: ""
      GEMINI_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Django system check
        run: python manage.py check

      - name: Run tests
        run: pytest
