x-app: &app
  build:
    context: .
    dockerfile: Dockerfile.dev
  env_file: .env
  environment:
    DATABASE_HOST: db
    REDIS_URL: redis://redis:6379/0
  volumes:
    - .:/app
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  db:
    image: postgres:15-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DATABASE_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 5s

  web:
    <<: *app
    ports:
      - "8000:8000"

  celery:
    <<: *app
    command: celery -A backend_sparqhub_django worker --loglevel=info --concurrency=2

volumes:
  pgdata_dev:
