x-app: &app
  build:
    context: .
    dockerfile: Dockerfile.dev
  env_file: .env
  environment:
    DATABASE_HOST: db
    REDIS_URL: redis://redis:6379/0
  volumes:
    - .:/app
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  db:
    image: pgvector/pgvector:pg15
    env_file: .env
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DATABASE_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 5s
    ports:
      - "6379:6379"

  # Mirrors docker-compose.yml's migrate service — without it, a migration
  # generated in code (committed, present in migrations/) can silently never
  # get applied to this dev DB, since nothing here forced it to run. That
  # gap let a model/DB schema mismatch persist undetected (see
  # librarian.0002_alter_memoryentry_embedding).
  migrate:
    <<: *app
    command: python manage.py migrate --noinput
    restart: "no"

  web:
    <<: *app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

  celery:
    <<: *app
    command: celery -A backend_sparqhub_django worker --loglevel=info --concurrency=2

volumes:
  pgdata_dev:
